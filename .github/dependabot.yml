# Dependabot dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
# Updates are consolidated into one monthly pull request per ecosystem.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      gomod-root:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    groups:
      github-actions-root:
        patterns:
          - "*"
